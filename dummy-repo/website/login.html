<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Demo Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <h1>Login</h1>

        <!-- VULNERABILITY: Form without HTTPS, no autocomplete="off" for sensitive fields -->
        <!-- VULNERABILITY: Action points to HTTP endpoint -->
        <form id="loginForm" action="https://api.example.com/login" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="off">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <!-- VULNERABILITY: Password field without autocomplete="new-password" -->
                <input type="password" id="password" name="password" required autocomplete="new-password">
            </div>

            <div class="form-group">
                <!-- VULNERABILITY: Storing sensitive data -->
                <label>
                    <input type="checkbox" id="rememberMe" name="rememberMe">
                    Remember me
                </label>
            </div>

            <button type="submit">Login</button>
        </form>

        <div id="loginError" class="error-message"></div>

        <div class="links">
            <a href="forgot-password.html">Forgot Password?</a>
            <a href="register.html">Create Account</a>
        </div>
    </div>

    <script>
        // VULNERABILITY: Storing password in localStorage
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;
            var rememberMe = document.getElementById('rememberMe').checked;

            // SECURITY FIX: Do not store credentials in localStorage
            if (rememberMe) {
                localStorage.setItem('username', username);
                // Password storage removed - never store passwords client-side
            }

            // SECURITY FIX: Use POST with body instead of GET parameters
            var xhr = new XMLHttpRequest();
            xhr.open('POST', 'https://api.example.com/auth', true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.send(JSON.stringify({
                username: username,
                password: password
            }));

            xhr.onload = function() {
                if (xhr.status == 200) {
                    // SECURITY FIX: Use textContent instead of innerHTML to prevent XSS
                    try {
                        var response = JSON.parse(xhr.responseText);
                        document.getElementById('loginError').textContent = response.message || '';

                        // SECURITY FIX: Set Secure and HttpOnly flags on cookie
                        var token = response.token;
                        document.cookie = "auth_token=" + token + "; Secure; HttpOnly; SameSite=Strict";

                        window.location.href = 'dashboard.html';
                    } catch (e) {
                        document.getElementById('loginError').textContent = 'An error occurred during login.';
                    }
                } else {
                    document.getElementById('loginError').textContent = 'Login failed. Please try again.';
                }
            };

            xhr.onerror = function() {
                document.getElementById('loginError').textContent = 'Network error. Please try again.';
            };
        });

        // SECURITY FIX: Remove debug logging
        // Debug information should not be exposed in production

        // SECURITY FIX: Remove client-side admin check
        // Authorization must be verified server-side, not client-side
    </script>
</body>
</html>
