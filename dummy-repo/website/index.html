<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Website - SonarCloud Test</title>
    <link rel="stylesheet" href="style.css">
    <!-- SECURITY FIX: Changed HTTP to HTTPS to prevent mixed content -->
    <script src="https://example.com/oldlib.js"></script>
</head>
<body>
    <header>
        <nav>
            <div class="logo">DemoSite</div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Welcome to Demo Website</h1>
            <p>This is a test website for SonarCloud scanning.</p>
        </section>

        <section class="search">
            <h2>Search</h2>
            <!-- SECURITY FIX: Removed inline event handler to prevent XSS -->
            <input type="text" id="searchInput" placeholder="Search...">
            <button id="searchBtn">Search</button>
            <div id="searchResults"></div>
        </section>

        <section class="comments">
            <h2>Comments</h2>
            <!-- SECURITY FIX: Added CSRF token field for protection -->
            <form action="/api/comments" method="POST">
                <input type="hidden" name="csrf_token" id="csrfToken">
                <input type="text" name="username" placeholder="Your name">
                <textarea name="comment" placeholder="Your comment"></textarea>
                <button type="submit">Submit</button>
            </form>
            <div id="commentsList"></div>
        </section>

        <section class="user-content">
            <h2>User Generated Content</h2>
            <!-- SECURITY FIX: Will use textContent instead of innerHTML in script -->
            <div id="userContent"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Demo Website. For testing purposes only.</p>
        <!-- SECURITY FIX: Removed inline event handler -->
        <button id="contactBtn">Contact</button>
    </footer>

    <script src="app.js"></script>

    <!-- SECURITY FIX: Moved sensitive logic to external file and removed hardcoded secrets -->
    <script>
        // SECURITY FIX: API key moved to environment/server-side configuration
        // DEBUG_MODE disabled for production
        var DEBUG_MODE = false;

        // SECURITY FIX: Replaced eval with JSON.parse for safe data processing
        function processData(data) {
            try {
                var result = JSON.parse(data);
                return result;
            } catch (e) {
                console.error("Invalid data format");
                return null;
            }
        }

        // SECURITY FIX: Replaced document.write with DOM manipulation
        document.addEventListener('DOMContentLoaded', function() {
            var pageLoadInfo = document.createElement('p');
            pageLoadInfo.textContent = "Page loaded at: " + new Date();
            document.body.appendChild(pageLoadInfo);
        });

        // SECURITY FIX: Event handlers moved from inline to JavaScript
        document.getElementById('searchBtn').addEventListener('click', performSearch);
        document.getElementById('contactBtn').addEventListener('click', function() {
            alert('Contact us!');
        });
    </script>
</body>
</html>
