<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Demo Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <h1>Login</h1>

        <form id="loginForm" action="https://api.example.com/login" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="off">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="new-password">
            </div>

            <div class="form-group">
                <label>
                    <input type="checkbox" id="rememberMe" name="rememberMe">
                    Remember me
                </label>
            </div>

            <button type="submit">Login</button>
        </form>

        <div id="loginError" class="error-message"></div>

        <div class="links">
            <a href="forgot-password.html">Forgot Password?</a>
            <a href="register.html">Create Account</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;
            var rememberMe = document.getElementById('rememberMe').checked;

            // SECURITY FIX: Remove credential storage
            if (rememberMe) {
                // Do not store credentials
            }

            // SECURITY FIX: Use POST with fetch and proper security
            fetch('https://api.example.com/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username: username,
                    password: password
                })
            })
            .then(response => response.json())
            .then(data => {
                // SECURITY FIX: Sanitize response and use textContent
                document.getElementById('loginError').textContent = data.message || '';

                // SECURITY FIX: Secure cookie with HttpOnly and Secure flags
                if (data.token) {
                    document.cookie = `auth_token=${data.token}; Secure; HttpOnly; SameSite=Strict`;
                    window.location.href = 'dashboard.html';
                }
            })
            .catch(error => {
                console.error('Login error:', error);
                document.getElementById('loginError').textContent = 'Login failed';
            });
        });

        // SECURITY FIX: Remove debug logging
        function checkAdmin() {
            // SECURITY FIX: Remove client-side admin check
        }
    </script>
</body>
</html>
