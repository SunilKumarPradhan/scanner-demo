<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Website - SonarCloud Test</title>
    <link rel="stylesheet" href="style.css">
    <!-- SECURITY FIX: Use HTTPS for external script -->
    <script src="https://example.com/oldlib.js"></script>
</head>
<body>
    <header>
        <nav>
            <div class="logo">DemoSite</div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Welcome to Demo Website</h1>
            <p>This is a test website for SonarCloud scanning.</p>
        </section>

        <section class="search">
            <h2>Search</h2>
            <!-- SECURITY FIX: Sanitize input to prevent DOM XSS -->
            <input type="text" id="searchInput" placeholder="Search...">
            <button id="searchButton">Search</button>
            <div id="searchResults"></div>
        </section>

        <section class="comments">
            <h2>Comments</h2>
            <!-- SECURITY FIX: Add CSRF token -->
            <form action="/api/comments" method="POST">
                <input type="hidden" name="csrf_token" id="csrf_token">
                <input type="text" name="username" placeholder="Your name">
                <textarea name="comment" placeholder="Your comment"></textarea>
                <button type="submit">Submit</button>
            </form>
            <div id="commentsList"></div>
        </section>

        <section class="user-content">
            <h2>User Generated Content</h2>
            <!-- SECURITY FIX: Use textContent instead of innerHTML -->
            <div id="userContent"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Demo Website. For testing purposes only.</p>
        <!-- SECURITY FIX: Remove inline event handler -->
        <button id="contactButton">Contact</button>
    </footer>

    <script src="app.js"></script>

    <script>
        // SECURITY FIX: Remove hardcoded API key
        const API_KEY = null;
        const DEBUG_MODE = false;

        // SECURITY FIX: Remove eval usage
        function processData(data) {
            try {
                return JSON.parse(data);
            } catch (error) {
                console.error('Error parsing data:', error);
                return null;
            }
        }

        // SECURITY FIX: Remove document.write
        document.addEventListener('DOMContentLoaded', function() {
            const loadTimeElement = document.createElement('p');
            loadTimeElement.textContent = `Page loaded at: ${new Date()}`;
            document.body.appendChild(loadTimeElement);
        });
    </script>
</body>
</html>
