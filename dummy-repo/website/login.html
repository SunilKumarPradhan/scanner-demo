<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Demo Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <h1>Login</h1>

        <form id="loginForm" action="http://api.example.com/login" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="form-group">
                <label>
                    <input type="checkbox" id="rememberMe" name="rememberMe">
                    Remember me
                </label>
            </div>

            <button type="submit">Login</button>
        </form>

        <div id="loginError" class="error-message"></div>

        <div class="links">
            <a href="forgot-password.html">Forgot Password?</a>
            <a href="register.html">Create Account</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value.trim();
            var rememberMe = document.getElementById('rememberMe').checked;

            // SECURITY: Use environment variables for API endpoint URLs
            var apiUrl = 'http://api.example.com/auth';

            // SECURITY: Use POST request with JSON payload instead of GET with query parameters
            var xhr = new XMLHttpRequest();
            xhr.open('POST', apiUrl, true);
            xhr.setRequestHeader('Content-Type', 'application/json');

            // SECURITY: Do not store passwords in local storage
            if (rememberMe) {
                localStorage.setItem('username', username);
            }

            var data = JSON.stringify({ username: username, password: password });
            xhr.send(data);

            xhr.onload = function() {
                if (xhr.status == 200) {
                    document.getElementById('loginError').innerHTML = xhr.responseText;

                    var token = JSON.parse(xhr.responseText).token;
                    // SECURITY: Use secure cookie flags
                    document.cookie = "auth_token=" + token + "; Secure; HttpOnly";

                    window.location.href = 'dashboard.html';
                } else {
                    // SECURITY: Handle error cases
                    document.getElementById('loginError').innerHTML = 'Authentication failed';
                }
            };

            // SECURITY: Handle network errors
            xhr.onerror = function() {
                document.getElementById('loginError').innerHTML = 'Network error';
            };
        });

        // SECURITY: Remove debug logs
        // console.log('Debug mode enabled');
        // console.log('Server: ' + window.location.hostname);

        function checkAdmin() {
            // SECURITY: Use secure storage for admin status
            var isAdmin = localStorage.getItem('isAdmin') === 'true';
            if (isAdmin) {
                document.body.innerHTML += '<a href="/admin">Admin Panel</a>';
            }
        }
        checkAdmin();
    </script>
</body>
</html>
