<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Website</title>
    <link rel="stylesheet" href="style.css">
    <script src="http://example.com/oldlib.js" integrity="sha256-abc123" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <nav>
            <div class="logo">DemoSite</div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Welcome to Demo Website</h1>
            <p>This is a demo website.</p>
        </section>

        <section class="search">
            <h2>Search</h2>
            <input type="text" id="searchInput" placeholder="Search...">
            <button onclick="performSearch()">Search</button>
            <div id="searchResults"></div>
        </section>

        <section class="comments">
            <h2>Comments</h2>
            <form action="/api/comments" method="POST">
                <input type="text" name="username" placeholder="Your name" required>
                <textarea name="comment" placeholder="Your comment" required></textarea>
                <button type="submit">Submit</button>
            </form>
            <div id="commentsList"></div>
        </section>

        <section class="user-content">
            <h2>User Generated Content</h2>
            <div id="userContent"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Demo Website.</p>
        <button onclick="alert('Contact us!')">Contact</button>
    </footer>

    <script src="app.js"></script>

    <script>
        var API_KEY = "sk_live_abc123secretkey456";
        var DEBUG_MODE = true;

        // SECURITY: Replaced eval with JSON.parse to prevent code injection attacks
        function processData(data) {
            try {
                var result = JSON.parse(data);
                return result;
            } catch (e) {
                console.error("Error parsing data:", e);
                return null;
            }
        }

        // SECURITY: Replaced document.write with innerHTML to prevent XSS attacks
        var currentDate = new Date().toLocaleString();
        document.getElementById("userContent").innerHTML = "<p>Page loaded at: " + currentDate + "</p>";
    </script>
</body>
</html>
