<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Demo Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <h1>Login</h1>

        <form id="loginForm" action="https://api.example.com/login" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" autocomplete="username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>

            <div class="form-group">
                <label>
                    <input type="checkbox" id="rememberMe" name="rememberMe">
                    Remember me
                </label>
            </div>

            <button type="submit">Login</button>
        </form>

        <div id="loginError" class="error-message"></div>

        <div class="links">
            <a href="forgot-password.html">Forgot Password?</a>
            <a href="register.html">Create Account</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;
            var rememberMe = document.getElementById('rememberMe').checked;

            if (rememberMe) {
                localStorage.setItem('username', username);
            }

            var xhr = new XMLHttpRequest();
            xhr.open('POST', 'https://api.example.com/login', true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.send(JSON.stringify({username: username, password: password}));

            xhr.onload = function() {
                if (xhr.status == 200) {
                    var response = JSON.parse(xhr.responseText);
                    document.getElementById('loginError').textContent = response.message || '';

                    var token = response.token;
                    document.cookie = "auth_token=" + token + "; Secure; SameSite=Strict; Path=/";

                    globalThis.location.href = 'dashboard.html';
                }
            };
        });

        function checkAdmin() {
            var isAdmin = localStorage.getItem('isAdmin') === 'true';
            if (isAdmin) {
                var adminLink = document.createElement('a');
                adminLink.href = '/admin';
                adminLink.textContent = 'Admin Panel';
                document.body.appendChild(adminLink);
            }
        }
        checkAdmin();
    </script>
</body>
</html>
